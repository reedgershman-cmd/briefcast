name: Weekly Signal

on:
  schedule:
    # Mondays 09:30 UTC = 5:30am ET — episode is waiting by breakfast.
    - cron: "30 9 * * 1"
  workflow_dispatch:
    inputs:
      max_episodes:
        description: "Max source episodes (blank = config default)"
        required: false

concurrency:
  group: weekly-signal
  cancel-in-progress: false

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write
    steps:
      - name: Check API keys are configured
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ] || [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::Missing repo secrets. Add ANTHROPIC_API_KEY and OPENAI_API_KEY under Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Produce weekly episode
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          EXTRA=""
          if [ -n "${{ github.event.inputs.max_episodes }}" ]; then
            EXTRA="--max-episodes ${{ github.event.inputs.max_episodes }}"
          fi
          uv run briefcast run $EXTRA

      - name: Commit and push results
        run: |
          git config user.name "briefcast-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/ state.json
          if git diff --cached --quiet; then
            echo "Nothing new this week."
          else
            git commit -m "Weekly Signal $(date -u +%F)"
            git push
          fi
